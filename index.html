<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clasificador CNN - Alzheimer MRI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.15.0"></script>
    <style>
        :root {
            --main: #00bcd4;
            --bg: #ffffff;
            --card: #f7f7f7;
            --text: #222;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: var(--main);
            margin-bottom: 5px;
        }

        .grid-container {
            display: flex;
            justify-content: center;
        }

        .panel {
            background: var(--card);
            width: 100%;
            max-width: 600px;
            padding: 20px;
            border-radius: 10px;
        }

        input[type="file"] {
            width: 100%;
            margin: 10px 0;
            padding: 8px;
            border: 1px solid #ccc;
            background: white;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: var(--main);
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
        }

        button:disabled {
            background: #aaa;
            cursor: not-allowed;
        }

        #imagePreview {
            max-width: 200px;
            margin: 15px auto;
            display: none;
            border-radius: 8px;
        }


        .status {
            margin-top: 10px;
            color: #666;
        }


        .winner {
            margin: 10px 0;
            font-weight: bold;
            color: var(--main);
        }

        .bar-wrap {
            margin: 8px 0;
            text-align: left;
        }

        .bar-label {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }

        .bar-bg {
            width: 100%;
            height: 10px;
            background: #ddd;
            border-radius: 5px;
            overflow: hidden;
        }

        .bar-fill {
            height: 10px;
            width: 0%;
            background: var(--main);
            transition: width 0.5s;
        }


        @media (max-width: 600px) {
            .panel {
                margin: 10px;
            }
        }
   
    </style>
</head>
<body>

    <h1>Análisis de MRI Cerebral</h1>

    <div class="grid-container">
        <div class="panel">
            <h2 style="color: var(--main-color); border-bottom: 1px solid #333; padding-bottom: 10px;">Diagnóstico</h2>
            <p class="status" id="statusMessage">Iniciando TensorFlow.js y compilando CNN...</p>
            
            <input type="file" id="fileInput" accept="image/png, image/jpeg" disabled>
            <img id="imagePreview" alt="Resonancia">
            
            <button id="btnAnalizar" disabled onclick="procesarImagen()">Ejecutar Inferencia CNN</button>
            
            <div id="resultadoBox" style="display: none; margin-top: 20px;">
                <div class="winner" id="lblGanador"></div>
                
                <div class="bar-wrap">
                    <div class="bar-label"><span>Non Demented (Sin demencia)</span><span id="val0">0%</span></div>
                    <div class="bar-bg"><div class="bar-fill" id="bar0"></div></div>
                </div>
                <div class="bar-wrap">
                    <div class="bar-label"><span>Very Mild Demented (Muy leve demencia)</span><span id="val1">0%</span></div>
                    <div class="bar-bg"><div class="bar-fill" id="bar1"></div></div>
                </div>
                <div class="bar-wrap">
                    <div class="bar-label"><span>Mild Demented (Leve demencia)</span><span id="val2">0%</span></div>
                    <div class="bar-bg"><div class="bar-fill" id="bar2"></div></div>
                </div>
                <div class="bar-wrap">
                    <div class="bar-label"><span>Moderate Demented (Moderada demencia)</span><span id="val3">0%</span></div>
                    <div class="bar-bg"><div class="bar-fill" id="bar3"></div></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const CLASES = ["Non Demented", "Very Mild Demented", "Mild Demented", "Moderate Demented"];
        let modelo;

        async function construirModelo() {
            try {
                modelo = await tf.loadLayersModel('./model.json');

                document.getElementById('statusMessage').innerText = "Modelo CNN entrenado cargado exitosamente.";
                document.getElementById('statusMessage').style.color = "#00ff00";
                document.getElementById('fileInput').disabled = false;

            } catch (error) {
                document.getElementById('statusMessage').innerText = "Error: No se encontró model.json. Revisa la consola.";
                document.getElementById('statusMessage').style.color = "red";
                console.error("Detalle del error:", error);
            }
        }

        const fileInput = document.getElementById('fileInput');
        const imgElement = document.getElementById('imagePreview');

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    imgElement.src = event.target.result;
                    imgElement.style.display = 'block';
                    document.getElementById('btnAnalizar').disabled = false;
                    document.getElementById('resultadoBox').style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        });

        async function procesarImagen() {
            document.getElementById('statusMessage').innerText = "Extrayendo características... (Inferencia en curso)";
            document.getElementById('statusMessage').style.color = "aqua";
            document.getElementById('btnAnalizar').disabled = true;
            setTimeout(async () => {
                const tensor = tf.tidy(() => {
                    let img = tf.browser.fromPixels(imgElement);
                    let resized = tf.image.resizeBilinear(img, [128, 128]);
                    let normalized = resized.toFloat().div(tf.scalar(255.0));
                    return normalized.expandDims(0); 
                });

                const predicciones = await modelo.predict(tensor).data();
                tensor.dispose(); 
                let maxVal = 0;
                let claseGanadora = 0;
                for(let i=0; i<4; i++) {
                    if(predicciones[i] > maxVal) { maxVal = predicciones[i]; claseGanadora = i; }
                }

                document.getElementById('resultadoBox').style.display = 'block';
                document.getElementById('lblGanador').innerText = `Diagnóstico: ${CLASES[claseGanadora]}`;

                for(let i=0; i<4; i++) {
                    let prob = (predicciones[i] * 100).toFixed(1);
                    document.getElementById(`bar${i}`).style.width = prob + '%';
                    document.getElementById(`val${i}`).innerText = prob + '%';
                }

                document.getElementById('statusMessage').innerText = "Inferencia completada exitosamente.";
                document.getElementById('statusMessage').style.color = "#00ff00";
                document.getElementById('btnAnalizar').disabled = false;
            }, 500);
        }

        window.onload = construirModelo;
    </script>
</body>
</html>
